name: Build y Release

# Se activa solo cuando hay push a la rama dev
on:
  push:
    branches:
      - dev

jobs:
  build-and-release:
    runs-on: windows-latest   # Compilar en Windows para que el .exe funcione en Windows

    permissions:
      contents: write         # Necesario para crear releases y hacer merge

    steps:
      # ── 1. Obtener el código ──────────────────────────────────────────────
      - name: Checkout rama dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Necesario para poder hacer merge después

      # ── 2. Instalar Python ───────────────────────────────────────────────
      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Instalar dependencias ─────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          pip install customtkinter openpyxl python-docx pillow pyinstaller docx2pdf tkinterdnd2

      # ── 4. Leer versión actual ───────────────────────────────────────────
      - name: Leer versión
        id: version
        shell: bash
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 5. Inyectar versión dentro del código antes de compilar ─────────
      - name: Inyectar versión en updater.py
        shell: python
        run: |
          from pathlib import Path
          version = Path("version.txt").read_text(encoding="utf-8").strip()
          content = Path("updater.py").read_text(encoding="utf-8")
          import re
          content = re.sub(r'VERSION_APP\s*=\s*".*?"', f'VERSION_APP = "{version}"', content)
          Path("updater.py").write_text(content, encoding="utf-8")
          print(f"Versión inyectada: {version}")
      
      - name: Verificar versión inyectada
        shell: bash
        run: grep "VERSION_APP" updater.py

      # ── 6. Verificar que la app importa correctamente ────────────────────
      - name: Verificar imports
        shell: bash
        run: |
          python -c "import app; print('✓ app.py importado correctamente')"
          python -c "import updater; print('✓ updater.py importado correctamente')"
          python -c "import engine; print('✓ engine.py importado correctamente')"

      # ── 7. Compilar el .exe ──────────────────────────────────────────────
      - name: Compilar con PyInstaller
        run: |
          pyinstaller build.spec

      # ── 8. Generar checksum SHA256 ───────────────────────────────────────
      - name: Generar SHA256
        id: checksum
        shell: bash
        run: |
          CHECKSUM=$(sha256sum dist/docsGen.exe | cut -d' ' -f1)
          echo "SHA256=$CHECKSUM" >> $GITHUB_OUTPUT

      # ── 9. Merge dev → main ──────────────────────────────────────────────
      - name: Merge dev a main
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git restore updater.py
          git checkout main
          git merge dev --no-ff -m "Release ${{ steps.version.outputs.TAG }}"
        env:
          GIT_MERGE_AUTOEDIT: no

      - name: Push main
        shell: bash
        run: git push origin main

      # ── 10. Eliminar release anterior (mantener solo el último) ──────────
      - name: Eliminar release anterior
        shell: bash
        run: |
          TAG_ANTERIOR=$(gh release list --limit 2 --json tagName -q '.[1].tagName' 2>/dev/null || echo "")
          if [ -n "$TAG_ANTERIOR" ]; then
            gh release delete "$TAG_ANTERIOR" --yes --delete-tag || true
            echo "Release anterior $TAG_ANTERIOR eliminado"
          fi

      # ── 11. Crear el Release en GitHub con el .exe ────────────────────────
      - name: Crear Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Versión ${{ steps.version.outputs.VERSION }}"
          target_commitish: main
          body: |
            ## Generador de Documentos ${{ steps.version.outputs.TAG }}
            
            Descarga el archivo `.exe` y reemplaza el anterior, o deja que la app lo haga automáticamente.

            **SHA256:** `${{ steps.checksum.outputs.SHA256 }}`
          files: dist/docsGen.exe
          draft: false
          prerelease: false
name: Build y Release

# Se activa solo cuando hay push a la rama dev
on:
  push:
    branches:
      - dev

jobs:
  build-and-release:
    runs-on: windows-latest   # Compilar en Windows para que el .exe funcione en Windows

    permissions:
      contents: write         # Necesario para crear releases y hacer merge

    steps:
      # ── 1. Obtener el código ──────────────────────────────────────────────
      - name: Checkout rama dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Necesario para poder hacer merge después

      # ── 2. Instalar Python ───────────────────────────────────────────────
      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Instalar dependencias ─────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          pip install customtkinter openpyxl python-docx pillow pyinstaller

      # ── 4. Leer versión actual ───────────────────────────────────────────
      - name: Leer versión
        id: version
        shell: bash
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # ── 5. Inyectar versión dentro del código antes de compilar ─────────
      - name: Inyectar versión en updater.py
        shell: bash
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          sed -i "s/VERSION_APP  = \".*\"/VERSION_APP  = \"$VERSION\"/" updater.py
          echo "Versión inyectada: $VERSION"

      # ── 6. Compilar el .exe ──────────────────────────────────────────────
      - name: Compilar con PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name "Generador de Documentos" `
            app.py

      # ── 7. Merge dev → main ──────────────────────────────────────────────
      - name: Merge dev a main
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge dev --no-ff -m "Release ${{ steps.version.outputs.TAG }}"
          git push origin main

      # ── 8. Crear el Release en GitHub con el .exe ────────────────────────
      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Versión ${{ steps.version.outputs.VERSION }}"
          target_commitish: main
          body: |
            ## Generador de Documentos ${{ steps.version.outputs.TAG }}
            
            Descarga el archivo `.exe` y reemplaza el anterior, o deja que la app lo haga automáticamente.
          files: dist/Generador de Documentos.exe
          draft: false
          prerelease: false